version: "3.8"

services:
  # Aplicação Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sales-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/etc/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./docker/etc/php-fpm.d:/usr/local/etc/php-fpm.d
    networks:
      - sales-network
    depends_on:
      - mysql
      - redis
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: sales-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/etc/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sales-network
    depends_on:
      - app

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: sales-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - sales-network

  # Redis
  redis:
    image: redis:alpine
    container_name: sales-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - sales-network
    volumes:
      - redis-data:/data

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sales-queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - sales-network
    depends_on:
      - mysql
      - redis
    command: php artisan queue:work redis --tries=3 --timeout=90
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - 8080:8080
    depends_on:
      - mysql
    networks:
      - sales-network

networks:
  sales-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
