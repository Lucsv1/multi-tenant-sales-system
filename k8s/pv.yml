apiVersion: v1
kind: PersistentVolume
metadata:
  name: sales-pv
  labels:
    name: sales-pv
spec:
  capacity:
    storage: 5Mi
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /home/lucas/projects/multi-tenant-sales-system/volumes
