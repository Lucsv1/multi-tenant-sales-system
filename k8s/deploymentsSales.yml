apiVersion: apps/v1
kind: Deployment
metadata:
  name: sales-deploy
  labels:
    app: sales-deploy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend-pod
  template:
    metadata:
      labels:
        app: backend-pod
    spec:
      initContainers:
        - name: copy-app
          image: lucsv1/sales-app
          command: ["sh", "-c", "cp -rp /var/www/. /app/"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: app-code
              mountPath: /app
      containers:
        - name: sales-backend
          image: lucsv1/sales-app
          volumeMounts:
            - name: app-code
              mountPath: /var/www
          env:
            - name: DB_HOST
              value: "banco-service"
            - name: DB_PORT
              value: "3306"
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: MYSQL_DATABASE
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret-banco
                  key: MYSQL_PASSWORD
            - name: CORS_ALLOWED_ORIGINS
              value: "http://192.168.49.2:30000"
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: "0.6"
              memory: "512Mi"
            requests:
              cpu: "0.2"
              memory: "256Mi"
          volumeMounts:
            - name: app-code
              mountPath: /var/www
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: app-code
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: nginx-config
