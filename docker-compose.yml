services:
  # Aplicação Laravel
  app:
    build:
      context: .
      dockerfile: ./sales-backend/Dockerfile
    container_name: sales-app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - ./sales-backend/.env
    volumes:
      - ./sales-backend:/var/www
      - ./sales-backend/docker/etc/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./sales-backend/docker/etc/php-fpm.d/zz-docker.conf:/usr/local/etc/php-fpm.d/zz-docker.conf
    networks:
      - sales-network
    depends_on:
      - mysql
      - redis

  # Frontend Quasar
  frontend:
    build:
      context: ./sales-frontend
      dockerfile: Dockerfile
    container_name: sales-frontend
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./sales-frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - sales-network

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: sales-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./sales-backend:/var/www
      - ./sales-backend/docker/etc/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sales-network
    depends_on:
      - app

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: sales-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
     MYSQL_ROOT_PASSWORD: root_password
     MYSQL_DATABASE: ${DB_DATABASE}
     MYSQL_USER: ${DB_USERNAME}
     MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - sales-network

  # Redis
  redis:
    image: redis:alpine
    container_name: sales-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - sales-network
    volumes:
      - redis-data:/data

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: ./sales-backend/Dockerfile
    container_name: sales-queue
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - ./sales-backend/.env
    volumes:
      - ./sales-backend:/var/www
    networks:
      - sales-network
    depends_on:
      - mysql
      - redis
    command: php /var/www/artisan queue:work redis --queue=default,reports --tries=3 --timeout=90

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - 8080:8080
    depends_on:
      - mysql
    networks:
      - sales-network

networks:
  sales-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
